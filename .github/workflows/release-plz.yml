name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      command:
        description: Release command to run
        required: true
        default: both
        type: choice
        options:
          - both
          - release-pr
          - release
      dry_run:
        description: Dry-run the release job when dispatching manually
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  release-plz-release:
    name: Release-plz Release
    if: github.event_name == 'push' || inputs.command == 'both' || inputs.command == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run release-plz release
        uses: release-plz/action@v0.5.128
        with:
          command: release
          config: release-plz.toml
          dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    if: github.event_name == 'push' || inputs.command == 'both' || inputs.command == 'release-pr'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5.128
        with:
          command: release-pr
          config: release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
